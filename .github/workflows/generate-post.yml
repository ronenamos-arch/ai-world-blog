name: Generate blog post

on:
  workflow_dispatch:
    inputs:
      post_type:
        description: "Post type"
        required: false
        default: "tool_explainer"
        type: choice
        options:
          - tool_explainer
          - tutorial
          - comparison
          - use_case
  schedule:
    - cron: "0 7 * * 0"  # Every Sunday at 07:00 UTC (10:00 Israel time)

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        working-directory: generator
        run: pip install -e ".[dev]"

      - name: Generate next post
        working-directory: generator
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
        run: |
          python -m src.cli --next --type ${{ github.event.inputs.post_type || 'tool_explainer' }}

      - name: Commit and push new post
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add blog/src/data/blog/ blog/public/images/ generator/state/processed.json
          if git diff --staged --quiet; then
            echo "No new post generated (queue empty or all processed)."
          else
            git commit -m "🤖 פוסט חדש (draft) — $(date +'%Y-%m-%d')"
            git push
          fi
